name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: |
          ZIP=$(ls *.zip | head -1)
          echo "Found zip: $ZIP"
          unzip "$ZIP"
          echo "--- Contents after unzip ---"
          ls -la
          echo "--- All folders ---"
          find . -maxdepth 2 -name "gradlew"

      - name: Make gradlew executable and build
        run: |
          GRADLEW=$(find . -name "gradlew" | head -1)
          echo "Found gradlew at: $GRADLEW"
          DIR=$(dirname "$GRADLEW")
          echo "Project dir: $DIR"
          chmod +x "$GRADLEW"
          cd "$DIR" && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
