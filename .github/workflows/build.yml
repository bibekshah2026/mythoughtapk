name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: List files
        run: ls -la

      - name: Unzip project
        run: |
          ZIP=$(ls *.zip | head -1)
          echo "Found zip: $ZIP"
          unzip "$ZIP"

      - name: List after unzip
        run: ls -la

      - name: Make gradlew executable
        run: chmod +x MyThoughtsApp/gradlew

      - name: Build APK
        run: cd MyThoughtsApp && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: MyThoughtsApp/app/build/outputs/apk/debug/app-debug.apk
