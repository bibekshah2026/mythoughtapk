name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip project
        run: unzip MyThoughtsApp.zip

      - name: Make gradlew executable
        run: chmod +x MyThoughtsApp/gradlew

      - name: Build APK
        run: cd MyThoughtsApp && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: app-debug
          path: MyThoughtsApp/app/build/outputs/apk/debug/app-debug.apk
