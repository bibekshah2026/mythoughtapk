name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Find and fix gradlew
        run: |
          echo "=== Repo structure ==="
          find . -type f | head -40
          echo "=== Looking for gradlew ==="
          find . -name "gradlew" 2>/dev/null
          GRADLEW=$(find . -name "gradlew" | head -1)
          DIR=$(dirname "$GRADLEW")
          echo "Found gradlew in: $DIR"
          cd "$DIR"
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MyThoughts-APK
          path: "**/app-debug.apk"
